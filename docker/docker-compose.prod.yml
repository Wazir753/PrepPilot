version: '3.8'

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api/v1
        REACT_APP_WS_URL: /
    restart: always
    networks:
      - preppilot_network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../backend/.env
    environment:
      ENVIRONMENT: production
    depends_on:
      - postgres
      - redis
    volumes:
      - uploads:/app/uploads
    networks:
      - preppilot_network

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: preppilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - preppilot_network

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data
    networks:
      - preppilot_network

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info
    restart: always
    env_file:
      - ../backend/.env
    depends_on:
      - backend
      - redis
    networks:
      - preppilot_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - preppilot_network

networks:
  preppilot_network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  uploads:
